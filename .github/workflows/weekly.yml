name: 週次 信用残高チェック

on:
  schedule:
    - cron: "30 9 * * 2"
    - cron: "0 23 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 必要なライブラリを入れる
        run: pip install -r requirements.txt

      - name: 集計スクリプトを実行
        run: python margin_tracker.py

      - name: 結果をリポジトリに保存
        run: |
          git config user.name "margin-tracker-bot"
          git config user.email "actions@github.com"
          git add report.md history.csv
          git diff --staged --quiet || git commit -m "自動更新: $(date -u +%Y-%m-%d)"
          git push
